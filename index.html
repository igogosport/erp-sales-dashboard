<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銷售儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f1efe8;--surface3:#e8e6df;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#88877f;
  --accent:#378ADD;--green:#1d9e75;--red:#d85a30;--amber:#ba7517;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2c2c2a;--surface3:#363634;
    --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
    --text:#f0ede8;--text2:#b4b2a9;--text3:#888780;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

header{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.hdr{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;height:52px}
.logo{font-size:15px;font-weight:600}
.nav-links{display:flex;gap:4px;margin-left:8px}
.nav-link{font-size:12px;padding:4px 10px;border-radius:var(--r-md);color:var(--text2);text-decoration:none;transition:all .15s}
.nav-link:hover{background:var(--surface2);color:var(--text)}
.nav-link.active{background:var(--surface2);color:var(--text);font-weight:500}
.spacer{flex:1}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#ccc;transition:background .3s}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#hdr-text{font-size:11px;color:var(--text3)}

/* filter area */
.filter-area{background:var(--surface);border-bottom:.5px solid var(--border);padding:12px 24px;display:none;gap:0}
.filter-inner{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--text3);white-space:nowrap;padding-top:5px;min-width:42px}
.tags{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.tag{padding:4px 11px;font-size:12px;font-family:inherit;border:.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;user-select:none;white-space:nowrap}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag.all-tag{font-weight:500}
.filter-divider{height:.5px;background:var(--border)}
.btn{padding:5px 12px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .1s}
.collapse-btn{padding:0 4px;font-size:11px;border:.5px solid var(--border2);border-radius:4px;background:var(--surface2);color:var(--text3);cursor:pointer;line-height:16px;transition:transform .2s;font-family:inherit}
.collapse-btn.collapsed{transform:rotate(-90deg)}
.btn:hover{background:var(--surface2)}

.page{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

.auth-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:40px;text-align:center;display:none}
.auth-card h3{font-size:14px;font-weight:500;margin-bottom:8px}
.auth-card p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.key-box{max-width:480px;margin:0 auto}
.key-box textarea{width:100%;height:80px;resize:none;font-size:11px;font-family:monospace;padding:8px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);margin-bottom:8px;display:block}
.key-box textarea:focus{outline:none;border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2a73c5}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.metric{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:500;line-height:1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:4px}

.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:20px}
.card-title{font-size:13px;font-weight:500;margin-bottom:16px}
.chart-wrap{position:relative;width:100%;height:300px}
.chart-wrap.tall{height:420px}
.grid-2{display:grid;grid-template-columns:3fr 2fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

.banner{border-radius:var(--r-md);padding:9px 12px;font-size:12px;display:flex;gap:7px}
.banner.err{background:rgba(216,90,48,.1);color:var(--red)}
.banner.ok{background:rgba(29,158,117,.1);color:var(--green)}

.tbl-wrap{overflow:auto;max-height:360px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{position:sticky;top:0;background:var(--surface);padding:6px 10px;text-align:left;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border);white-space:nowrap}
tbody td{padding:6px 10px;border-bottom:.5px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px}
.badge-ok{background:rgba(29,158,117,.12);color:var(--green)}
.badge-warn{background:rgba(186,117,23,.1);color:var(--amber)}
.badge-err{background:rgba(216,90,48,.1);color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">銷售儀表板</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">銷售</a>
      <a href="profit.html" class="nav-link">毛利分析</a>
      <a href="inventory.html" class="nav-link">庫存健康度</a>
    </div>
    <div class="spacer"></div>
    <span class="dot" id="dot"></span>
    <span id="hdr-text">載入中…</span>
    <button class="btn" onclick="loadAll()" style="margin-left:8px">↻ 重新讀取</button>
  </div>
</header>

<div class="filter-area" id="filter-area">
  <div class="filter-inner">
    <div class="filter-row">
      <span class="filter-label">品牌</span>
      <div class="tags" id="brand-tags"></div>
    </div>
    <div id="cat-row" style="display:none"><div class="filter-divider"></div><div class="filter-row"><span class="filter-label" style="display:flex;align-items:center;gap:5px">類別<button class="collapse-btn" onclick="toggleCollapse('cat-tags-wrap')" title="折疊">▾</button></span><div id="cat-tags-wrap"><div class="tags" id="cat-tags"></div></div></div></div>
    <div id="prod-row" style="display:none"><div class="filter-divider"></div><div class="filter-row"><span class="filter-label" style="display:flex;align-items:center;gap:5px">產品<button class="collapse-btn" onclick="toggleCollapse('prod-tags-wrap')" title="折疊">▾</button></span><div id="prod-tags-wrap"><div class="tags" id="prod-tags"></div></div></div></div>
    <div class="filter-divider"></div>
    <div id="month-rows"></div>
  </div>
</div>

<div class="page">

  <div class="auth-card" id="auth-card">
    <h3>請輸入 Service Account 金鑰</h3>
    <p>貼上 Google Service Account 的 JSON 金鑰，之後每次開啟會自動連線。</p>
    <div class="key-box">
      <textarea id="key-input" placeholder='{ "type": "service_account", ... }'></textarea>
      <button class="btn btn-primary" style="width:100%" onclick="saveKey()">連線</button>
    </div>
  </div>

  <div id="banner"></div>

  <div class="metrics" id="metrics" style="display:none">
    <div class="metric">
      <div class="metric-label">最新月銷售量</div>
      <div class="metric-value" id="m-latest">—</div>
      <div class="metric-sub" id="m-month">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">近 12 個月合計</div>
      <div class="metric-value" id="m-total">—</div>
      <div class="metric-sub">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">當前總庫存</div>
      <div class="metric-value" id="m-inv">—</div>
      <div class="metric-sub">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">品項數（有庫存）</div>
      <div class="metric-value" id="m-skus">—</div>
      <div class="metric-sub">個 SKU</div>
    </div>
  </div>

  <div class="grid-2" id="charts-row" style="display:none">
    <div class="card">
      <div class="card-title" id="sales-title">每月銷售量</div>
      <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
        <span id="rank-title">銷售排名</span>
        <div style="display:flex;gap:4px">
          <span class="tag active" id="rank-top20" onclick="setRankLimit(20)" style="font-size:11px;padding:2px 9px">前 20</span>
          <span class="tag" id="rank-all" onclick="setRankLimit(0)" style="font-size:11px;padding:2px 9px">全部</span>
        </div>
      </div>
      <div class="chart-wrap tall" id="rank-chart-wrap"><canvas id="rankChart"></canvas></div>
    </div>
  </div>

  <div class="card" id="rev-chart-card" style="display:none">
    <div class="card-title" id="rev-title">每月銷售金額</div>
    <div class="chart-wrap"><canvas id="revChart"></canvas></div>
  </div>

  <div id="brand-rank-section" style="display:none">
    <div class="grid-2">
      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
          <span>品牌銷售排名</span>
          <div style="display:flex;gap:4px">
            <span class="tag active" id="brank-top10" onclick="setBrandLimit(10)" style="font-size:11px;padding:2px 9px">前 10</span>
            <span class="tag" id="brank-all" onclick="setBrandLimit(0)" style="font-size:11px;padding:2px 9px">全部</span>
          </div>
        </div>
        <div class="chart-wrap tall" id="brand-rank-wrap"><canvas id="brandRankChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">品牌營收比例</div>
        <div class="chart-wrap tall"><canvas id="brandPieChart"></canvas></div>
      </div>
    </div>
  </div>

</div>

<script>
const SPREADSHEET_ID='1N87NXPJuRNXyuONZOJyIN5iyMdpgmykx_iTGWAZSgW0';
const SALES_SHEET='ERP銷售資料';
const INV_SHEET='ERP庫存';
const MASTER_SHEET='✨「計算表」季節性加權';
const SCOPE='https://www.googleapis.com/auth/spreadsheets.readonly';
const TOKEN_URL='https://oauth2.googleapis.com/token';

let saKey=null,accessToken=null,tokenExpiry=0;
let monthSales={},allMonths=[],masterBrand={},masterName={},masterCategory={},invItems=[];

// selected filters: empty Set = all selected
let selectedBrands=new Set();
let selectedMonths=new Set();
let selectedCategories=new Set();
let selectedProducts=new Set(); // stores product codes

/* status */
function setDot(s,t){document.getElementById('dot').className='dot '+s;document.getElementById('hdr-text').textContent=t}
function showBanner(type,msg){
  const el=document.getElementById('banner');
  if(!msg){el.innerHTML='';return;}
  el.innerHTML=`<div class="banner ${type}">${type==='ok'?'✓':'⚠'} ${msg}</div>`;
  if(type==='ok')setTimeout(()=>el.innerHTML='',3000);
}

/* jwt */
function b64url(d){const b=typeof d==='string'?btoa(unescape(encodeURIComponent(d))):btoa(String.fromCharCode(...new Uint8Array(d)));return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_')}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry-30000)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const p=b64url(JSON.stringify({iss:saKey.client_email,scope:SCOPE,aud:TOKEN_URL,iat:now,exp:now+3600}));
  const si=`${h}.${p}`;
  const pem=saKey.private_key.replace(/-----BEGIN PRIVATE KEY-----/,'').replace(/-----END PRIVATE KEY-----/,'').replace(/\n/g,'');
  const kb=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const ck=await crypto.subtle.importKey('pkcs8',kb,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',ck,new TextEncoder().encode(si));
  const jwt=`${si}.${b64url(sig)}`;
  const res=await fetch(TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if(!d.access_token)throw new Error(d.error_description||'Token失敗');
  accessToken=d.access_token;tokenExpiry=Date.now()+(d.expires_in||3600)*1000;
  return accessToken;
}
async function apiGet(url){
  const tok=await getToken();
  const res=await fetch(url,{headers:{Authorization:`Bearer ${tok}`}});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`)}
  return res.json();
}

/* auth */
function saveKey(){
  const raw=document.getElementById('key-input').value.trim();
  try{JSON.parse(raw);}catch{showBanner('err','JSON 格式錯誤');return;}
  localStorage.setItem('sa_key',raw);
  saKey=JSON.parse(raw);
  document.getElementById('auth-card').style.display='none';
  loadAll();
}

/* load */
async function loadAll(){
  setDot('spin','讀取中…');
  try{
    const [sRes,iRes,mRes]=await Promise.all([
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SALES_SHEET)}`),
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(INV_SHEET)}`),
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(MASTER_SHEET+'!B:E')}`)
    ]);
    parseMaster(mRes.values||[]);
    parseSales(sRes.values||[]);
    parseInv(iRes.values||[]);
    buildFilters();
    renderAll();
    setDot('ok',`已更新 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}`);
  }catch(e){
    setDot('err','讀取失敗');
    showBanner('err','讀取失敗：'+e.message);
  }
}

/* parse master brand table (計算表 B=ID, C=品牌, D=商品名稱, E=類別) */
const BRAND_NORMALIZE={'Scosche':'SCOSCHE','MARLEY_OLD':'MARLEY','PHILIPS':'Philips'};
function normBrand(b){return BRAND_NORMALIZE[b]||b;}

const CODE_BRAND_OVERRIDES={'G00004555':'JLab','G00004564':'JLab','G00005375':'JLab','G00009160':'JBL'};
const NAME_BRAND_PREFIXES=[
  ['myFirst','myFirst'],['Marshall','Marshall'],['JBL','JBL'],['JLab','JLab'],
  ['GO Air','JLab'],['WONDERBOOM','UE'],['Marley','MARLEY'],
  ['鐵三角','鐵三角'],['DOSHISHA','DOSHISHA'],['Harman','Harman Kardon'],
  ['EarFun','EarFun'],['Cardo','Cardo'],['Cricut','Cricut'],
  ['UE ','UE'],['Enacfire','Enacfire'],['Blue ','Blue Microphones'],
];
function detectBrand(code,name){
  if(masterBrand[code])return masterBrand[code];
  if(CODE_BRAND_OVERRIDES[code])return CODE_BRAND_OVERRIDES[code];
  const m=name.match(/【(.+?)】/);if(m)return m[1];
  for(const[prefix,brand]of NAME_BRAND_PREFIXES){if(name.startsWith(prefix))return brand;}
  return '其他';
}

function parseMaster(rows){
  masterBrand={};masterName={};masterCategory={};
  rows.slice(1).forEach(r=>{
    const id=String(r[0]||'').trim();
    const brand=normBrand(String(r[1]||'').trim());
    const name=String(r[2]||'').trim();
    const cat=String(r[3]||'').trim();
    if(!id)return;
    if(brand)masterBrand[id]=brand;
    if(name)masterName[id]=name;
    if(cat)masterCategory[id]=cat;
  });
}

/* parse sales */
function parseSales(rows){
  if(!rows.length)return;
  const hdr=rows[0].map(h=>String(h).trim());
  const fi=(...kws)=>{for(const k of kws){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  const dateIdx=fi('日期轉換'),nameIdx=fi('品項名稱','商品名稱'),codeIdx=fi('品項編碼','商品ID');
  const qtyIdx=hdr.findIndex(h=>h==='數量'),revIdx=fi('合計');
  monthSales={};
  const mSet=new Set();
  rows.slice(1).forEach(r=>{
    const date=String(r[dateIdx]||'').trim();
    if(!/^\d{4}\/\d{1,2}$/.test(date))return;
    const code=String(r[codeIdx]||'').trim();
    const name=String(r[nameIdx]||'').trim();
    const qty=parseFloat(String(r[qtyIdx]||'0').replace(/,/g,''))||0;
    const rev=revIdx>=0?parseFloat(String(r[revIdx]||'0').replace(/,/g,''))||0:0;
    const brand=detectBrand(code,name);
    const[y,mo]=date.split('/');const key=y+mo.padStart(2,'0');
    mSet.add(key);
    if(!monthSales[key])monthSales[key]={brands:{},codes:{},brandRev:{},codeRev:{}};
    monthSales[key].brands[brand]=(monthSales[key].brands[brand]||0)+qty;
    monthSales[key].brandRev[brand]=(monthSales[key].brandRev[brand]||0)+rev;
    if(code){
      monthSales[key].codes[code]=(monthSales[key].codes[code]||0)+qty;
      monthSales[key].codeRev[code]=(monthSales[key].codeRev[code]||0)+rev;
    }
  });
  allMonths=[...mSet].sort();
}

/* parse inventory */
function parseInv(rows){
  invItems=[];
  const seen=new Set();
  rows.forEach(r=>{
    const code=String(r[1]||'').trim();
    const name=String(r[2]||'').trim();
    const qty=parseFloat(String(r[3]||'').replace(/,/g,''));
    if(!/^[A-Z]\d{5,}$/.test(code)||!name||isNaN(qty))return;
    if(seen.has(code))return;
    seen.add(code);
    const brand=detectBrand(code,name);
    invItems.push({code,name,qty,brand});
  });
}

/* brand tags: single-select, Ctrl+click for multi-select */
function renderBrandTags(brands){
  const el=document.getElementById('brand-tags');
  el.innerHTML='';
  const allTag=document.createElement('span');
  allTag.className='tag all-tag'+(selectedBrands.size===0?' active':'');
  allTag.textContent='全部';
  allTag.onclick=()=>{selectedBrands.clear();renderBrandTags(brands);renderAll();};
  el.appendChild(allTag);
  brands.forEach(b=>{
    const t=document.createElement('span');
    t.className='tag'+(selectedBrands.has(b)?' active':'');
    t.textContent=b;
    t.onclick=(e)=>{
      if(e.ctrlKey||e.metaKey){
        // Ctrl: toggle multi-select
        if(selectedBrands.has(b))selectedBrands.delete(b);
        else selectedBrands.add(b);
      } else {
        // normal click: single-select (or clear if already sole selection)
        if(selectedBrands.size===1&&selectedBrands.has(b))selectedBrands.clear();
        else{selectedBrands.clear();selectedBrands.add(b);}
      }
      renderBrandTags(brands);renderCatProdRows();renderAll();
    };
    el.appendChild(t);
  });
}

/* category + product rows (shown when a brand is selected) */
function renderCatProdRows(){
  const activeBrands=getActiveBrands();
  const catRow=document.getElementById('cat-row');
  const prodRow=document.getElementById('prod-row');
  if(!activeBrands){
    catRow.style.display='none';prodRow.style.display='none';
    selectedCategories.clear();selectedProducts.clear();
    return;
  }
  // products belonging to selected brands
  const brandCodes=Object.keys(masterBrand).filter(id=>activeBrands.includes(masterBrand[id]));
  // unique categories for those products
  const cats=[...new Set(brandCodes.map(id=>masterCategory[id]).filter(Boolean))].sort();
  // products: filter by selected categories if any
  const activeCats=selectedCategories.size?[...selectedCategories]:null;
  const prodCodes=brandCodes.filter(id=>!activeCats||activeCats.includes(masterCategory[id]));

  // render category tags
  catRow.style.display='block';
  const catEl=document.getElementById('cat-tags');
  catEl.innerHTML='';
  const catAll=document.createElement('span');
  catAll.className='tag all-tag'+(selectedCategories.size===0?' active':'');
  catAll.textContent='全部';
  catAll.onclick=()=>{selectedCategories.clear();selectedProducts.clear();renderCatProdRows();renderAll();};
  catEl.appendChild(catAll);
  cats.forEach(c=>{
    const t=document.createElement('span');
    t.className='tag'+(selectedCategories.has(c)?' active':'');
    t.textContent=c;
    t.onclick=(e)=>{
      if(e.ctrlKey||e.metaKey){
        if(selectedCategories.has(c))selectedCategories.delete(c);
        else selectedCategories.add(c);
      } else {
        if(selectedCategories.size===1&&selectedCategories.has(c))selectedCategories.clear();
        else{selectedCategories.clear();selectedCategories.add(c);}
      }
      selectedProducts.clear();
      renderCatProdRows();renderAll();
    };
    catEl.appendChild(t);
  });

  // render product tags
  prodRow.style.display='block';
  const prodEl=document.getElementById('prod-tags');
  prodEl.innerHTML='';
  const prodAll=document.createElement('span');
  prodAll.className='tag all-tag'+(selectedProducts.size===0?' active':'');
  prodAll.textContent='全部';
  prodAll.onclick=()=>{selectedProducts.clear();renderCatProdRows();renderAll();};
  prodEl.appendChild(prodAll);
  prodCodes.forEach(id=>{
    const label=masterName[id]||id;
    const t=document.createElement('span');
    t.className='tag'+(selectedProducts.has(id)?' active':'');
    t.textContent=label;
    t.onclick=(e)=>{
      if(e.ctrlKey||e.metaKey){
        if(selectedProducts.has(id))selectedProducts.delete(id);
        else selectedProducts.add(id);
      } else {
        if(selectedProducts.size===1&&selectedProducts.has(id))selectedProducts.clear();
        else{selectedProducts.clear();selectedProducts.add(id);}
      }
      renderCatProdRows();renderAll();
    };
    prodEl.appendChild(t);
  });
}

/* month tags: one row per year */
function renderMonthTags(){
  const container=document.getElementById('month-rows');
  container.innerHTML='';
  // group months by year
  const byYear={};
  allMonths.forEach(m=>{const y=m.slice(0,4);if(!byYear[y])byYear[y]=[];byYear[y].push(m);});
  const years=Object.keys(byYear).sort().reverse();
  years.forEach(y=>{
    const row=document.createElement('div');
    row.className='filter-row';
    const lbl=document.createElement('span');
    lbl.className='filter-label';lbl.textContent=y;
    row.appendChild(lbl);
    const tags=document.createElement('div');
    tags.className='tags';
    // "全年" tag
    const allYrTag=document.createElement('span');
    const yearMonths=byYear[y];
    const allYrActive=yearMonths.every(m=>selectedMonths.has(m));
    allYrTag.className='tag all-tag'+(allYrActive?' active':'');
    allYrTag.textContent='全年';
    allYrTag.onclick=()=>{
      if(allYrActive)yearMonths.forEach(m=>selectedMonths.delete(m));
      else yearMonths.forEach(m=>selectedMonths.add(m));
      renderMonthTags();renderSales();renderRevChart();renderRanking();if(selectedBrands.size===0)renderBrandRanking();
    };
    tags.appendChild(allYrTag);
    // individual months: Jan → Dec
    [...yearMonths].forEach(m=>{
      const t=document.createElement('span');
      t.className='tag'+(selectedMonths.has(m)?' active':'');
      t.textContent=m;
      t.onclick=()=>{
        if(selectedMonths.has(m))selectedMonths.delete(m);
        else selectedMonths.add(m);
        renderMonthTags();renderSales();renderRevChart();renderRanking();if(selectedBrands.size===0)renderBrandRanking();
      };
      tags.appendChild(t);
    });
    row.appendChild(tags);
    container.appendChild(row);
    // divider between years (except last)
    if(y!==years[years.length-1]){
      const div=document.createElement('div');
      div.className='filter-divider';
      container.appendChild(div);
    }
  });
}

/* build filters */
function buildFilters(){
  const brands=[...new Set(Object.values(masterBrand))].filter(Boolean).sort();
  selectedBrands=new Set();
  selectedCategories=new Set();
  selectedProducts=new Set();
  selectedMonths=new Set();
  [...allMonths].reverse().slice(0,12).forEach(m=>selectedMonths.add(m));
  renderBrandTags(brands);
  renderCatProdRows();
  renderMonthTags();
}

/* get active filters */
function getActiveBrands(){return selectedBrands.size?[...selectedBrands]:null;}
function getActiveMonths(){return selectedMonths.size?[...selectedMonths].sort():null;}
function getActiveProducts(){return selectedProducts.size?[...selectedProducts]:null;}
function getActiveCats(){return selectedCategories.size?[...selectedCategories]:null;}

/* render */
function renderAll(){
  document.getElementById('filter-area').style.display='block';
  document.getElementById('metrics').style.display='grid';
  document.getElementById('charts-row').style.display='grid';
  const showBrandRank=selectedBrands.size===0;
  document.getElementById('rev-chart-card').style.display='block';
  document.getElementById('brand-rank-section').style.display=showBrandRank?'block':'none';
  renderSales();
  renderRanking();
  renderRevChart();
  renderInventoryMetrics();
  if(showBrandRank)renderBrandRanking();
}

let salesChart=null;
function renderSales(){
  const brands=getActiveBrands();
  const prods=getActiveProducts();
  const cats=getActiveCats();
  const activeMo=getActiveMonths();
  const months=activeMo||allMonths.slice().sort();
  const data=months.map(m=>{
    const s=monthSales[m]||{brands:{},codes:{}};
    if(prods)return prods.reduce((sum,id)=>sum+(s.codes[id]||0),0);
    if(cats){
      const catCodes=Object.keys(masterCategory).filter(id=>cats.includes(masterCategory[id])&&(!brands||brands.includes(masterBrand[id])));
      return catCodes.reduce((sum,id)=>sum+(s.codes[id]||0),0);
    }
    if(brands)return brands.reduce((sum,b)=>sum+(s.brands[b]||0),0);
    return Object.values(s.brands).reduce((a,b)=>a+b,0);
  });
  const latest=data[data.length-1]||0;
  document.getElementById('m-latest').textContent=latest.toLocaleString();
  document.getElementById('m-month').textContent=(months[months.length-1]||'')+' 件';
  document.getElementById('m-total').textContent=data.slice(-12).reduce((a,b)=>a+b,0).toLocaleString();
  const brandLabel=brands?brands.join('、'):'全品牌';
  document.getElementById('sales-title').textContent=brandLabel+' 每月銷售量';
  if(salesChart)salesChart.destroy();
  salesChart=new Chart(document.getElementById('salesChart'),{
    type:'line',
    data:{labels:months,datasets:[{data,borderColor:'#378ADD',backgroundColor:'#378ADD22',borderWidth:2,pointRadius:3,pointBackgroundColor:'#378ADD',fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y.toLocaleString()} 件`}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,maxTicksLimit:18}},y:{beginAtZero:true,ticks:{font:{size:10}}}}}
  });
}

let revChart=null;
function renderRevChart(){
  const brands=getActiveBrands();
  const prods=getActiveProducts();
  const cats=getActiveCats();
  const activeMo=getActiveMonths();
  const months=activeMo||allMonths.slice().sort();
  const data=months.map(m=>{
    const s=monthSales[m]||{};
    if(prods)return prods.reduce((sum,id)=>sum+(s.codeRev&&s.codeRev[id]||0),0);
    if(cats){
      const catCodes=Object.keys(masterCategory).filter(id=>cats.includes(masterCategory[id])&&(!brands||brands.includes(masterBrand[id])));
      return catCodes.reduce((sum,id)=>sum+(s.codeRev&&s.codeRev[id]||0),0);
    }
    if(brands)return brands.reduce((sum,b)=>sum+(s.brandRev&&s.brandRev[b]||0),0);
    return Object.values(s.brandRev||{}).reduce((a,b)=>a+b,0);
  });
  const brandLabel=brands?brands.join('、'):'全品牌';
  document.getElementById('rev-title').textContent=brandLabel+' 每月銷售金額';
  if(revChart)revChart.destroy();
  revChart=new Chart(document.getElementById('revChart'),{
    type:'line',
    data:{labels:months,datasets:[{data:data.map(v=>Math.round(v/10000)),borderColor:'#1D9E75',backgroundColor:'#1D9E7522',borderWidth:2,pointRadius:3,pointBackgroundColor:'#1D9E75',fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y.toLocaleString()} 萬`}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,maxTicksLimit:18}},y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v+'萬'}}}}
  });
}

let rankLimit=20;
function setRankLimit(n){
  rankLimit=n;
  document.getElementById('rank-top20').className='tag'+(n===20?' active':'');
  document.getElementById('rank-all').className='tag'+(n===0?' active':'');
  renderRanking();
}

let rankChart=null;
function renderRanking(){
  const brands=getActiveBrands();
  const prods=getActiveProducts();
  const cats=getActiveCats();
  const activeMo=getActiveMonths();
  const months=activeMo||allMonths.slice().sort();

  // aggregate sales per product code across selected months
  const totals={};
  months.forEach(m=>{
    const codes=(monthSales[m]||{}).codes||{};
    Object.entries(codes).forEach(([code,qty])=>{
      totals[code]=(totals[code]||0)+qty;
    });
  });

  // filter by active brand/cat/prod
  let entries=Object.entries(totals).filter(([code])=>{
    if(prods)return prods.includes(code);
    if(cats&&brands)return cats.includes(masterCategory[code])&&brands.includes(masterBrand[code]);
    if(cats)return cats.includes(masterCategory[code]);
    if(brands)return brands.includes(masterBrand[code]);
    return true;
  });

  entries.sort((a,b)=>b[1]-a[1]);
  const show=rankLimit>0?entries.slice(0,rankLimit):entries;

  // dynamic chart height: min 300px, 22px per item
  const chartH=Math.max(300,show.length*22);
  document.getElementById('rank-chart-wrap').style.height=chartH+'px';

  const labels=show.map(([code])=>{
    const n=masterName[code]||code;
    return n.length>28?n.slice(0,28)+'…':n;
  });
  const data=show.map(([,qty])=>qty);
  const mx=Math.max(...data,1);
  const colors=data.map(v=>v/mx>0.6?'#378ADDcc':v/mx>0.3?'#378ADD88':'#378ADD44');

  if(rankChart)rankChart.destroy();
  rankChart=new Chart(document.getElementById('rankChart'),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:ctx=>masterName[show[ctx[0].dataIndex][0]]||show[ctx[0].dataIndex][0],
        label:ctx=>` 銷量：${ctx.parsed.x.toLocaleString()} 件`
      }}},
      scales:{x:{position:'top',beginAtZero:true,ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}
  });

  const brandLabel=brands?brands.join('、'):'全品牌';
  document.getElementById('rank-title').textContent=brandLabel+' 銷售排名';
}

function renderInventoryMetrics(){
  const brands=getActiveBrands();
  const prods=getActiveProducts();
  const cats=getActiveCats();
  let items=prods?invItems.filter(x=>prods.includes(x.code)):
            cats?invItems.filter(x=>cats.includes(masterCategory[x.code])&&(!brands||brands.includes(x.brand))):
            brands?invItems.filter(x=>brands.includes(x.brand)):[...invItems];
  items=items.filter(x=>x.qty>0);
  document.getElementById('m-inv').textContent=items.reduce((a,x)=>a+x.qty,0).toLocaleString();
  document.getElementById('m-skus').textContent=items.length.toLocaleString();
}

const PIE_COLORS=['#378ADD','#1D9E75','#BA7517','#d85a30','#7c5cbf','#2ab7ca',
  '#e8a838','#4caf82','#e05c94','#6b8e23','#c0392b','#1a7abf'];

let brandLimit=10;
function setBrandLimit(n){
  brandLimit=n;
  document.getElementById('brank-top10').className='tag'+(n===10?' active':'');
  document.getElementById('brank-all').className='tag'+(n===0?' active':'');
  renderBrandRanking();
}

let brandRankChart=null,brandPieChart=null;
function renderBrandRanking(){
  const activeMo=getActiveMonths();
  const months=activeMo||allMonths.slice().sort();

  // aggregate revenue per brand across selected months
  const revTotals={};
  months.forEach(m=>{
    const br=(monthSales[m]||{}).brandRev||{};
    Object.entries(br).forEach(([b,v])=>{ revTotals[b]=(revTotals[b]||0)+v; });
  });

  let entries=Object.entries(revTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const show=brandLimit>0?entries.slice(0,brandLimit):entries;

  // bar chart
  const barH=Math.max(300,show.length*28);
  document.getElementById('brand-rank-wrap').style.height=barH+'px';
  const barLabels=show.map(([b])=>b);
  const barData=show.map(([,v])=>Math.round(v/10000));
  const mx=Math.max(...barData,1);
  const barColors=barData.map(v=>v/mx>0.6?'#378ADDcc':v/mx>0.3?'#378ADD88':'#378ADD44');

  if(brandRankChart)brandRankChart.destroy();
  brandRankChart=new Chart(document.getElementById('brandRankChart'),{
    type:'bar',
    data:{labels:barLabels,datasets:[{data:barData,backgroundColor:barColors,borderWidth:0,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x.toLocaleString()} 萬`}},
        datalabels:{anchor:'end',align:'end',color:'var(--text2)',font:{size:10},formatter:v=>v.toLocaleString()+'萬'}},
      scales:{x:{position:'top',beginAtZero:true,ticks:{font:{size:9},callback:v=>v+'萬'}},y:{ticks:{font:{size:10}}}}}
  });

  // pie chart — top 10 only for readability
  const pieEntries=entries.slice(0,10);
  const pieLabels=pieEntries.map(([b])=>b);
  const pieData=pieEntries.map(([,v])=>v);
  const total=pieData.reduce((a,b)=>a+b,0);

  if(brandPieChart)brandPieChart.destroy();
  brandPieChart=new Chart(document.getElementById('brandPieChart'),{
    type:'pie',
    data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:PIE_COLORS.slice(0,pieLabels.length),borderWidth:2,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'right',labels:{font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:ctx=>{
          const pct=total?((ctx.parsed/total)*100).toFixed(1):'0';
          return ` ${ctx.label}：${Math.round(ctx.parsed/10000).toLocaleString()}萬 (${pct}%)`;
        }}},
        datalabels:{
          color:'#fff',
          font:{size:11,weight:'bold'},
          formatter:(value,ctx)=>{
            const pct=total?(value/total*100):0;
            if(pct<4)return ''; // hide tiny slices
            return pct.toFixed(1)+'%';
          },
          anchor:'center',align:'center',
          textShadowBlur:4,textShadowColor:'rgba(0,0,0,.6)'
        }
      }}
  });
}

/* collapse toggle */
function toggleCollapse(wrapId){
  const wrap=document.getElementById(wrapId);
  const btn=wrap.previousElementSibling.querySelector('.collapse-btn');
  const collapsed=wrap.style.display==='none';
  wrap.style.display=collapsed?'':'none';
  btn.classList.toggle('collapsed',!collapsed);
}

/* init */
window.addEventListener('load',async()=>{
  const raw=localStorage.getItem('sa_key');
  if(!raw){document.getElementById('auth-card').style.display='block';setDot('err','未連線');return;}
  try{saKey=JSON.parse(raw);await loadAll();}
  catch(e){setDot('err','連線失敗');showBanner('err',e.message);document.getElementById('auth-card').style.display='block';}
});
</script>
