<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銷售與庫存儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f1efe8;--surface3:#e8e6df;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#88877f;
  --accent:#378ADD;--green:#1d9e75;--red:#d85a30;--amber:#ba7517;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2c2c2a;--surface3:#363634;
    --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
    --text:#f0ede8;--text2:#b4b2a9;--text3:#888780;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

header{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.hdr{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;height:52px}
.logo{font-size:15px;font-weight:600;flex:1}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#ccc;transition:background .3s}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#hdr-text{font-size:11px;color:var(--text3)}

/* filter area */
.filter-area{background:var(--surface);border-bottom:.5px solid var(--border);padding:12px 24px;display:none;gap:0}
.filter-inner{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--text3);white-space:nowrap;padding-top:5px;min-width:42px}
.tags{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.tag{padding:4px 11px;font-size:12px;font-family:inherit;border:.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;user-select:none;white-space:nowrap}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag.all-tag{font-weight:500}
.filter-divider{height:.5px;background:var(--border)}
.btn{padding:5px 12px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .1s}
.btn:hover{background:var(--surface2)}

.page{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

.auth-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:40px;text-align:center;display:none}
.auth-card h3{font-size:14px;font-weight:500;margin-bottom:8px}
.auth-card p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.key-box{max-width:480px;margin:0 auto}
.key-box textarea{width:100%;height:80px;resize:none;font-size:11px;font-family:monospace;padding:8px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);margin-bottom:8px;display:block}
.key-box textarea:focus{outline:none;border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2a73c5}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.metric{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:500;line-height:1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:4px}

.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:20px}
.card-title{font-size:13px;font-weight:500;margin-bottom:16px}
.chart-wrap{position:relative;width:100%;height:300px}
.chart-wrap.tall{height:420px}
.grid-2{display:grid;grid-template-columns:3fr 2fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

.banner{border-radius:var(--r-md);padding:9px 12px;font-size:12px;display:flex;gap:7px}
.banner.err{background:rgba(216,90,48,.1);color:var(--red)}
.banner.ok{background:rgba(29,158,117,.1);color:var(--green)}

.tbl-wrap{overflow:auto;max-height:360px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{position:sticky;top:0;background:var(--surface);padding:6px 10px;text-align:left;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border);white-space:nowrap}
tbody td{padding:6px 10px;border-bottom:.5px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px}
.badge-ok{background:rgba(29,158,117,.12);color:var(--green)}
.badge-warn{background:rgba(186,117,23,.1);color:var(--amber)}
.badge-err{background:rgba(216,90,48,.1);color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">銷售與庫存儀表板</div>
    <span class="dot" id="dot"></span>
    <span id="hdr-text">載入中…</span>
    <button class="btn" onclick="loadAll()" style="margin-left:8px">↻ 重新讀取</button>
  </div>
</header>

<div class="filter-area" id="filter-area">
  <div class="filter-inner">
    <div class="filter-row">
      <span class="filter-label">品牌</span>
      <div class="tags" id="brand-tags"></div>
    </div>
    <div class="filter-divider"></div>
    <div id="month-rows"></div>
  </div>
</div>

<div class="page">

  <div class="auth-card" id="auth-card">
    <h3>請輸入 Service Account 金鑰</h3>
    <p>貼上 Google Service Account 的 JSON 金鑰，之後每次開啟會自動連線。</p>
    <div class="key-box">
      <textarea id="key-input" placeholder='{ "type": "service_account", ... }'></textarea>
      <button class="btn btn-primary" style="width:100%" onclick="saveKey()">連線</button>
    </div>
  </div>

  <div id="banner"></div>

  <div class="metrics" id="metrics" style="display:none">
    <div class="metric">
      <div class="metric-label">最新月銷售量</div>
      <div class="metric-value" id="m-latest">—</div>
      <div class="metric-sub" id="m-month">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">近 12 個月合計</div>
      <div class="metric-value" id="m-total">—</div>
      <div class="metric-sub">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">當前總庫存</div>
      <div class="metric-value" id="m-inv">—</div>
      <div class="metric-sub">件</div>
    </div>
    <div class="metric">
      <div class="metric-label">品項數（有庫存）</div>
      <div class="metric-value" id="m-skus">—</div>
      <div class="metric-sub">個 SKU</div>
    </div>
  </div>

  <div class="grid-2" id="charts-row" style="display:none">
    <div class="card">
      <div class="card-title" id="sales-title">每月銷售量</div>
      <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">庫存排行（前 20）</div>
      <div class="chart-wrap tall"><canvas id="invChart"></canvas></div>
    </div>
  </div>

  <div class="card" id="inv-card" style="display:none">
    <div class="card-title" id="inv-title">庫存明細</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>品項編碼</th><th>品項名稱</th><th>品牌</th><th style="text-align:right">庫存數量</th><th>狀態</th></tr></thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const SPREADSHEET_ID='1N87NXPJuRNXyuONZOJyIN5iyMdpgmykx_iTGWAZSgW0';
const SALES_SHEET='ERP銷售資料';
const INV_SHEET='ERP庫存';
const MASTER_SHEET='✨「計算表」季節性加權';
const SCOPE='https://www.googleapis.com/auth/spreadsheets.readonly';
const TOKEN_URL='https://oauth2.googleapis.com/token';

let saKey=null,accessToken=null,tokenExpiry=0;
let monthSales={},allMonths=[],masterBrand={},invItems=[];

// selected filters: empty Set = all selected
let selectedBrands=new Set();
let selectedMonths=new Set();

/* status */
function setDot(s,t){document.getElementById('dot').className='dot '+s;document.getElementById('hdr-text').textContent=t}
function showBanner(type,msg){
  const el=document.getElementById('banner');
  if(!msg){el.innerHTML='';return;}
  el.innerHTML=`<div class="banner ${type}">${type==='ok'?'✓':'⚠'} ${msg}</div>`;
  if(type==='ok')setTimeout(()=>el.innerHTML='',3000);
}

/* jwt */
function b64url(d){const b=typeof d==='string'?btoa(unescape(encodeURIComponent(d))):btoa(String.fromCharCode(...new Uint8Array(d)));return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_')}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry-30000)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const p=b64url(JSON.stringify({iss:saKey.client_email,scope:SCOPE,aud:TOKEN_URL,iat:now,exp:now+3600}));
  const si=`${h}.${p}`;
  const pem=saKey.private_key.replace(/-----BEGIN PRIVATE KEY-----/,'').replace(/-----END PRIVATE KEY-----/,'').replace(/\n/g,'');
  const kb=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const ck=await crypto.subtle.importKey('pkcs8',kb,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',ck,new TextEncoder().encode(si));
  const jwt=`${si}.${b64url(sig)}`;
  const res=await fetch(TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if(!d.access_token)throw new Error(d.error_description||'Token失敗');
  accessToken=d.access_token;tokenExpiry=Date.now()+(d.expires_in||3600)*1000;
  return accessToken;
}
async function apiGet(url){
  const tok=await getToken();
  const res=await fetch(url,{headers:{Authorization:`Bearer ${tok}`}});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`)}
  return res.json();
}

/* auth */
function saveKey(){
  const raw=document.getElementById('key-input').value.trim();
  try{JSON.parse(raw);}catch{showBanner('err','JSON 格式錯誤');return;}
  localStorage.setItem('sa_key',raw);
  saKey=JSON.parse(raw);
  document.getElementById('auth-card').style.display='none';
  loadAll();
}

/* load */
async function loadAll(){
  setDot('spin','讀取中…');
  try{
    const [sRes,iRes,mRes]=await Promise.all([
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SALES_SHEET)}`),
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(INV_SHEET)}`),
      apiGet(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(MASTER_SHEET+'!B:C')}`)
    ]);
    parseMaster(mRes.values||[]);
    parseSales(sRes.values||[]);
    parseInv(iRes.values||[]);
    buildFilters();
    renderAll();
    setDot('ok',`已更新 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}`);
  }catch(e){
    setDot('err','讀取失敗');
    showBanner('err','讀取失敗：'+e.message);
  }
}

/* parse master brand table (計算表 B=商品ID, C=品牌) */
function parseMaster(rows){
  masterBrand={};
  rows.slice(1).forEach(r=>{
    const id=String(r[0]||'').trim();
    const brand=String(r[1]||'').trim();
    if(id&&brand)masterBrand[id]=brand;
  });
}

/* parse sales */
function parseSales(rows){
  if(!rows.length)return;
  const hdr=rows[0].map(h=>String(h).trim());
  const fi=(...kws)=>{for(const k of kws){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  const dateIdx=fi('日期轉換'),nameIdx=fi('品項名稱','商品名稱'),codeIdx=fi('品項編碼','商品ID');
  const qtyIdx=hdr.findIndex(h=>h==='數量');
  monthSales={};
  const mSet=new Set();
  rows.slice(1).forEach(r=>{
    const date=String(r[dateIdx]||'').trim();
    if(!/^\d{4}\/\d{1,2}$/.test(date))return;
    const code=String(r[codeIdx]||'').trim();
    const name=String(r[nameIdx]||'').trim();
    const qty=parseFloat(String(r[qtyIdx]||'0').replace(/,/g,''))||0;
    // brand lookup: master table first, then 【Brand】 pattern
    const brand=masterBrand[code]||(name.match(/【(.+?)】/)||[])[1]||'其他';
    const[y,mo]=date.split('/');const key=y+mo.padStart(2,'0');
    mSet.add(key);
    if(!monthSales[key])monthSales[key]={};
    monthSales[key][brand]=(monthSales[key][brand]||0)+qty;
  });
  allMonths=[...mSet].sort();
}

/* parse inventory */
function parseInv(rows){
  invItems=[];
  const seen=new Set();
  rows.forEach(r=>{
    const code=String(r[1]||'').trim();
    const name=String(r[2]||'').trim();
    const qty=parseFloat(String(r[3]||'').replace(/,/g,''));
    if(!/^[A-Z]\d{5,}$/.test(code)||!name||isNaN(qty))return;
    if(seen.has(code))return;
    seen.add(code);
    const brand=masterBrand[code]||(name.match(/【(.+?)】/)||[])[1]||'其他';
    invItems.push({code,name,qty,brand});
  });
}

/* brand tags: single-select, Ctrl+click for multi-select */
function renderBrandTags(brands){
  const el=document.getElementById('brand-tags');
  el.innerHTML='';
  const allTag=document.createElement('span');
  allTag.className='tag all-tag'+(selectedBrands.size===0?' active':'');
  allTag.textContent='全部';
  allTag.onclick=()=>{selectedBrands.clear();renderBrandTags(brands);renderAll();};
  el.appendChild(allTag);
  brands.forEach(b=>{
    const t=document.createElement('span');
    t.className='tag'+(selectedBrands.has(b)?' active':'');
    t.textContent=b;
    t.onclick=(e)=>{
      if(e.ctrlKey||e.metaKey){
        // Ctrl: toggle multi-select
        if(selectedBrands.has(b))selectedBrands.delete(b);
        else selectedBrands.add(b);
      } else {
        // normal click: single-select (or clear if already sole selection)
        if(selectedBrands.size===1&&selectedBrands.has(b))selectedBrands.clear();
        else{selectedBrands.clear();selectedBrands.add(b);}
      }
      renderBrandTags(brands);renderAll();
    };
    el.appendChild(t);
  });
}

/* month tags: one row per year */
function renderMonthTags(){
  const container=document.getElementById('month-rows');
  container.innerHTML='';
  // group months by year
  const byYear={};
  allMonths.forEach(m=>{const y=m.slice(0,4);if(!byYear[y])byYear[y]=[];byYear[y].push(m);});
  const years=Object.keys(byYear).sort().reverse();
  years.forEach(y=>{
    const row=document.createElement('div');
    row.className='filter-row';
    const lbl=document.createElement('span');
    lbl.className='filter-label';lbl.textContent=y;
    row.appendChild(lbl);
    const tags=document.createElement('div');
    tags.className='tags';
    // "全年" tag
    const allYrTag=document.createElement('span');
    const yearMonths=byYear[y];
    const allYrActive=yearMonths.every(m=>selectedMonths.has(m));
    allYrTag.className='tag all-tag'+(allYrActive?' active':'');
    allYrTag.textContent='全年';
    allYrTag.onclick=()=>{
      if(allYrActive)yearMonths.forEach(m=>selectedMonths.delete(m));
      else yearMonths.forEach(m=>selectedMonths.add(m));
      renderMonthTags();renderSales();
    };
    tags.appendChild(allYrTag);
    // individual months (newest first within year)
    [...yearMonths].reverse().forEach(m=>{
      const t=document.createElement('span');
      t.className='tag'+(selectedMonths.has(m)?' active':'');
      t.textContent=m;
      t.onclick=()=>{
        if(selectedMonths.has(m))selectedMonths.delete(m);
        else selectedMonths.add(m);
        renderMonthTags();renderSales();
      };
      tags.appendChild(t);
    });
    row.appendChild(tags);
    container.appendChild(row);
    // divider between years (except last)
    if(y!==years[years.length-1]){
      const div=document.createElement('div');
      div.className='filter-divider';
      container.appendChild(div);
    }
  });
}

/* build filters */
function buildFilters(){
  const brands=[...new Set(Object.values(masterBrand))].filter(Boolean).sort();
  selectedBrands=new Set();
  selectedMonths=new Set();
  // default: latest 12 months
  [...allMonths].reverse().slice(0,12).forEach(m=>selectedMonths.add(m));
  renderBrandTags(brands);
  renderMonthTags();
}

/* get active filters */
function getActiveBrands(){return selectedBrands.size?[...selectedBrands]:null;}
function getActiveMonths(){return selectedMonths.size?[...selectedMonths].sort():null;}

/* render */
function renderAll(){
  document.getElementById('filter-area').style.display='block';
  document.getElementById('metrics').style.display='grid';
  document.getElementById('charts-row').style.display='grid';
  document.getElementById('inv-card').style.display='block';
  renderSales();
  renderInventory();
}

let salesChart=null;
function renderSales(){
  const brands=getActiveBrands();
  const activeMo=getActiveMonths();
  const months=activeMo||allMonths.slice().sort();
  const data=months.map(m=>{
    const s=monthSales[m]||{};
    if(!brands)return Object.values(s).reduce((a,b)=>a+b,0);
    return brands.reduce((sum,b)=>sum+(s[b]||0),0);
  });
  const latest=data[data.length-1]||0;
  document.getElementById('m-latest').textContent=latest.toLocaleString();
  document.getElementById('m-month').textContent=(months[months.length-1]||'')+' 件';
  document.getElementById('m-total').textContent=data.slice(-12).reduce((a,b)=>a+b,0).toLocaleString();
  const brandLabel=brands?brands.join('、'):'全品牌';
  document.getElementById('sales-title').textContent=brandLabel+' 每月銷售量';
  const mx=Math.max(...data,1);
  const colors=data.map(v=>v/mx>0.6?'#378ADDcc':v/mx>0.3?'#378ADD88':'#378ADD44');
  if(salesChart)salesChart.destroy();
  salesChart=new Chart(document.getElementById('salesChart'),{
    type:'bar',
    data:{labels:months,datasets:[{data,backgroundColor:colors,borderWidth:0,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y.toLocaleString()} 件`}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,maxTicksLimit:18}},y:{beginAtZero:true,ticks:{font:{size:10}}}}}
  });
}

let invChart=null;
function renderInventory(){
  const brands=getActiveBrands();
  let items=brands?invItems.filter(x=>brands.includes(x.brand)):[...invItems];
  items=items.filter(x=>x.qty>0).sort((a,b)=>b.qty-a.qty);
  document.getElementById('m-inv').textContent=items.reduce((a,x)=>a+x.qty,0).toLocaleString();
  document.getElementById('m-skus').textContent=items.length.toLocaleString();
  const brandLabel=brands?brands.join('、'):'全品牌';
  document.getElementById('inv-title').textContent=brandLabel+' 庫存明細';

  const top=items.slice(0,20);
  const mx=Math.max(...top.map(x=>x.qty),1);
  const colors=top.map(x=>x.qty/mx>0.6?'#1D9E75cc':x.qty/mx>0.3?'#BA7517cc':'#88877888');
  if(invChart)invChart.destroy();
  invChart=new Chart(document.getElementById('invChart'),{
    type:'bar',
    data:{labels:top.map(x=>x.name.length>22?x.name.slice(0,22)+'…':x.name),
          datasets:[{data:top.map(x=>x.qty),backgroundColor:colors,borderWidth:0,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:ctx=>top[ctx[0].dataIndex].name,
        label:ctx=>` 庫存：${ctx.parsed.x.toLocaleString()} 件`
      }}},
      scales:{x:{beginAtZero:true,ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}
  });

  const tbody=document.getElementById('inv-tbody');
  tbody.innerHTML='';
  items.forEach(x=>{
    const cls=x.qty>50?'badge-ok':x.qty>10?'badge-warn':'badge-err';
    const tag=x.qty>50?'充足':x.qty>10?'警示':'低庫存';
    tbody.insertAdjacentHTML('beforeend',`<tr>
      <td style="font-family:monospace;color:var(--text3);font-size:10px">${x.code}</td>
      <td>${x.name}</td>
      <td style="color:var(--text2)">${x.brand}</td>
      <td style="text-align:right;font-weight:500">${x.qty.toLocaleString()}</td>
      <td><span class="badge ${cls}">${tag}</span></td>
    </tr>`);
  });
}

/* init */
window.addEventListener('load',async()=>{
  const raw=localStorage.getItem('sa_key');
  if(!raw){document.getElementById('auth-card').style.display='block';setDot('err','未連線');return;}
  try{saKey=JSON.parse(raw);await loadAll();}
  catch(e){setDot('err','連線失敗');showBanner('err',e.message);document.getElementById('auth-card').style.display='block';}
});
</script>
